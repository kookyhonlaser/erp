<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Order Viewer - Stamp Image</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #e5e7eb; color: #111827; font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; }
    .toolbar { position: sticky; top: 0; z-index: 10; background: #111827; color: #fff; padding: 12px 18px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .toolbar button { border: 0; background: #2563eb; color: #fff; padding: 10px 16px; border-radius: 8px; font-weight: 800; cursor: pointer; }
    .page { width: 210mm; min-height: 297mm; margin: 20px auto; background: #fff; padding: 12mm 12mm 11mm; box-shadow: 0 10px 28px rgba(15, 23, 42, .18); overflow: hidden; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #222; padding: 5px 6px; vertical-align: middle; }
    th { background: #f1f5f9; }
    .center { text-align: center; }
    .num { text-align: right; white-space: nowrap; }
    .logo { font-size: 34px; font-weight: 900; font-style: italic; letter-spacing: -2px; }
    .title-ko { font-size: 32px; font-weight: 900; letter-spacing: 18px; text-align: center; margin: 8px 0 12px; }
    .title-en { font-size: 28px; font-weight: 900; margin: 6px 0 18px; }
    .muted { color: #94a3b8; font-size: 12px; }
    .loading, .error { max-width: 720px; margin: 80px auto; background: #fff; padding: 30px; border-radius: 16px; text-align: center; box-shadow: 0 10px 28px rgba(15,23,42,.12); }
    .item-data { font-size: 16px; font-weight: 700; line-height: 1.12; }
    .seal-wrap { position:absolute; right:14px; top:54px; width:72px; height:72px; opacity:.72; pointer-events:none; z-index:2; }
    .seal-img { width:72px; height:72px; object-fit:contain; display:block; }

    @page { size: A4; margin: 0; }
    @media print {
      body { background: #fff; }
      .toolbar { display: none !important; }
      .page { margin: 0; box-shadow: none; width: 210mm; min-height: 297mm; padding: 12mm; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="toolbar no-print">
    <div><b>발주서 보기 / 인쇄</b> <span id="poMeta" class="muted"></span></div>
    <button onclick="window.print()">인쇄하기</button>
  </div>
  <div id="app" class="loading">발주서를 불러오는 중입니다...</div>

  <script>
    const GET_PO_PUBLIC_URL = "https://uqdxgadpzajeioebijht.supabase.co/functions/v1/get-po-public";

    function esc(v) { return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }
    function num(v) { return Number(v || 0).toLocaleString("ko-KR"); }
    function dateKo(v){ const m=String(v||"").match(/^(\d{4})-(\d{2})-(\d{2})/); return m?`${m[1]}년 ${m[2]}월 ${m[3]}일`:esc(v); }
    function dateEn(v){ const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; const m=String(v||"").match(/^(\d{4})-(\d{2})-(\d{2})/); return m?`${m[3]}-${months[Number(m[2])-1]}-${m[1]}`:esc(v); }
    function moneyKo(n){ n=Math.floor(Number(n||0)); if(!n)return"영"; const nums=["","일","이","삼","사","오","육","칠","팔","구"], pos=["","십","백","천"], units=["","만","억","조"]; function part(x){let out="",str=String(x).padStart(4,"0"); for(let i=0;i<4;i++){const d=Number(str[i]); if(!d)continue; const p=3-i; out+=(d===1&&p>0?"":nums[d])+pos[p];} return out;} const groups=[]; while(n>0){groups.push(n%10000); n=Math.floor(n/10000);} let out=""; for(let i=groups.length-1;i>=0;i--) if(groups[i]) out+=part(groups[i])+units[i]; return out; }

    function rowsDomestic(items) {
      const rows = [...(items || [])];
      while (rows.length < 11) rows.push({ no: rows.length + 1, name: "", spec: "", qty: "", price: "", amount: "" });
      return rows.map(i => `
        <tr>
          <td class="center" style="font-size:13px;">${i.name ? esc(i.no) : "&nbsp;"}</td>
          <td class="item-data">${esc(i.name || "")}</td>
          <td class="item-data">${esc(i.spec || "")}</td>
          <td class="center item-data">${i.name ? esc(i.qty) : ""}</td>
          <td class="num item-data">${i.name ? num(i.price) : ""}</td>
          <td class="num item-data">${i.name ? num(i.amount) : ""}</td>
        </tr>`).join("");
    }

    function rowsOverseas(items){ const rows=[...(items||[])]; while(rows.length<7) rows.push({no:rows.length+1,name:"",spec:"",qty:"",price:"",amount:""}); return rows.map(i=>`<tr><td class="center">${i.name?esc(i.no):"&nbsp;"}</td><td class="item-data">${esc(i.spec||"")}</td><td class="item-data">${esc(i.name||"")}</td><td class="center item-data">${i.name?"EA":""}</td><td class="num item-data">${i.name?num(i.price):""}</td><td class="center item-data">${i.name?esc(i.qty):""}</td><td class="num item-data">${i.name?num(i.amount):""}</td></tr>`).join(""); }

    async function loadPO(){
      const token=new URLSearchParams(location.search).get("token");
      const app=document.getElementById("app");
      if(!token){ app.className="error"; app.textContent="발주서 토큰이 없습니다."; return; }
      try{
        const res=await fetch(`${GET_PO_PUBLIC_URL}?token=${encodeURIComponent(token)}`);
        const data=await res.json();
        if(!res.ok || !data.ok) throw new Error(data.error || "발주서를 불러오지 못했습니다.");
        const po=data.po;
        document.title=po.po_no || "Purchase Order";
        document.getElementById("poMeta").textContent=po.po_no ? " / " + po.po_no : "";
        app.className="";
        app.innerHTML=po.type==="overseas" ? renderOverseas(po) : renderDomestic(po);
      }catch(err){
        app.className="error";
        app.innerHTML=`<h2>발주서를 불러오지 못했습니다.</h2><p>${esc(err.message || err)}</p>`;
      }
    }
    loadPO();
  </script>
