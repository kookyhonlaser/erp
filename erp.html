                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500">

            </div>
            <div id="modalBody"></div>
        </div>

    <!-- 데이터 불러오기 모달 -->
    <div id="loadDataModal" class="modal no-print" style="z-index: 60;">
        <div class="modal-content" style="max-width: 800px;">
            <h3 class="text-xl font-bold mb-4" id="loadModalTitle">데이터 불러오기</h3>
            <div class="overflow-y-auto max-h-96 border rounded">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="p-3">날짜</th>
                            <th class="p-3">거래처</th>
                            <th class="p-3">총액</th>
                            <th class="p-3">선택</th>
                        </tr>
                    </thead>
                    <tbody id="loadDataBody"></tbody>
                </table>
            </div>
            <div class="mt-6 text-right">
                <button onclick="document.getElementById('loadDataModal').classList.remove('active')" class="px-6 py-2 bg-slate-200 rounded text-sm font-bold">
                    닫기
                </button>
            </div>
        </div>

    <!-- 일정 추가/수정 모달 -->
    <div id="eventModal" class="modal no-print">
        <div class="modal-content" style="max-width: 600px;">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 id="eventModalTitle" class="text-2xl font-bold text-slate-800">일정 추가</h2>
                <button onclick="closeEventModal()" class="text-slate-400 hover:text-red-500">
                    <i class="fa-solid fa-times text-2xl"></i>
                </button>
            </div>
            <div id="eventModalBody">
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">일정 제목</label>
                    <input type="text" id="eventTitle" class="input-box" placeholder="일정 제목을 입력하세요">
                </div>
                <div class="mb-4">
                    <label class="flex items-center gap-2 text-sm font-semibold text-slate-700 mb-2">
                        <input type="checkbox" id="eventAllDay" onchange="toggleAllDay()">
                        <span>하루 종일</span>
                    </label>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">시작</label>
                        <input type="date" id="eventStartDate" class="input-box mb-2">
                        <input type="time" id="eventStartTime" class="input-box">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">종료</label>
                        <input type="date" id="eventEndDate" class="input-box mb-2">
                        <input type="time" id="eventEndTime" class="input-box">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">메모</label>
                    <textarea id="eventDescription" class="input-box" rows="3" placeholder="메모를 입력하세요"></textarea>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">색상 라벨</label>
                    <div class="color-selector">
                        <div class="color-option event-red" data-color="red" onclick="selectColor('red')"></div>
                        <div class="color-option event-orange" data-color="orange" onclick="selectColor('orange')"></div>
                        <div class="color-option event-yellow" data-color="yellow" onclick="selectColor('yellow')"></div>
                        <div class="color-option event-green selected" data-color="green" onclick="selectColor('green')"></div>
                        <div class="color-option event-blue" data-color="blue" onclick="selectColor('blue')"></div>
                        <div class="color-option event-indigo" data-color="indigo" onclick="selectColor('indigo')"></div>
                        <div class="color-option event-purple" data-color="purple" onclick="selectColor('purple')"></div>
                        <div class="color-option event-pink" data-color="pink" onclick="selectColor('pink')"></div>
                    </div>
                </div>
                <div class="flex justify-between">
                    <button id="deleteEventBtn" onclick="deleteEvent()" class="px-6 py-3 bg-red-500 text-white rounded font-bold hover:bg-red-600" style="display: none;">삭제</button>
                    <div class="flex-1"></div>
                    <button onclick="closeEventModal()" class="px-6 py-3 bg-slate-200 rounded font-bold hover:bg-slate-300 mr-2">취소</button>
                    <button onclick="saveEvent()" class="px-6 py-3 bg-blue-500 text-white rounded font-bold hover:bg-blue-600">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 일정 더보기 모달 -->

    <!-- 프린트 컨테이너 -->
    <div id="printContainer" class="hidden">
        <div class="print-wrap">
            <div class="print-title-area">

            <div class="print-grid-box">
                <div class="print-half">

                    <table class="print-info-table">
                        <colgroup><col style="width: 20%;"><col style="width: 80%;"></colgroup>
                        <tr><th>상호</th><td id="p_left_name"></td></tr>
                        <tr id="print_row_addr_1"><th>주소</th><td id="p_left_addr" class="addr-cell"></td></tr>
                        <tr><th>담당자</th><td id="p_left_manager"></td></tr>
                        <tr><th>TEL</th><td id="p_left_phone"></td></tr>
                        <tr><th>E-mail</th><td id="p_left_email"></td></tr>
                    </table>
                </div>
                <div class="print-half">
                    <div class="print-header-cell" id="p_right_role">공 급 자</div>
                    <table class="print-info-table">
                        <colgroup><col style="width: 20%;"><col style="width: 80%;"></colgroup>
                        <tr><th>상호</th><td id="p_right_name">쿠키혼레이저 (KOOKY)</td></tr>
                        <tr id="print_row_addr_2"><th>주소</th><td class="addr-cell" style="font-size: 10px;">경기도 화성시 메타폴리스로 42, 9층 902호<br>(반송동, 디앤씨빌딩)</td></tr>
                        <tr><th>담당자</th><td id="p_right_manager"></td></tr>
                        <tr><th>TEL</th><td id="p_right_mp"></td></tr>
                        <tr><th>E-mail</th><td id="p_right_email"></td></tr>
                    </table>
                </div>
            </div>
            
            <table class="print-items-table">
                <colgroup>
                    <col style="width: 5%;">
                    <col style="width: 25%;">
                    <col style="width: 30%;">
                    <col style="width: 8%;">
                    <col style="width: 8%;">
                    <col style="width: 12%;">
                    <col style="width: 12%;">
                </colgroup>
                <thead>
                    <tr><th>No</th><th>품명</th><th>규격</th><th>단위</th><th>수량</th><th>단가</th><th>공급가액</th></tr>
                </thead>
                <tbody id="p_tbody"></tbody>
                <tfoot>
                    <tr style="background: #f8f8f8; font-weight: bold;">
                        <td colspan="4" style="text-align: center; border-right: 1px solid black;">합 계 (Total)</td>
                        <td style="text-align: center; border-right: 1px solid black;" id="p_total_qty"></td>
                        <td style="text-align: right; border-right: 1px solid black;">VAT 포함</td>
                        <td style="text-align: right;" id="p_total_amt"></td>
                    </tr>
                    <tr style="background: #fff; border-top: 2px double black;">
                        <td colspan="7" style="padding: 10px; text-align: left;">
                            <strong>[비고]</strong> <span id="p_note"></span>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- 국내/해외 발주서 기능 + 검색/거래처 자동불러오기 -->
    <script>
        const PO_STORAGE_KEY = 'kooky_purchase_orders_v2';
        let partnerCache = [];
        let partnerCacheLoaded = false;
        let selectedPartnerResults = { domestic: [], overseas: [] };

        function setPurchaseOrderActiveNav(btn) {
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-slate-800', 'text-white', 'font-bold');
            });
            if (btn) {
                btn.classList.add('bg-slate-800', 'text-white', 'font-bold');
            }
        }

        async function openPurchaseOrderMenu(btn) {
            setPurchaseOrderActiveNav(btn);
            const searchContainer = document.getElementById('searchContainer');
            const contentArea = document.getElementById('contentArea');
            if (searchContainer) searchContainer.innerHTML = '';

            contentArea.innerHTML = `
                <div class="max-w-7xl mx-auto">
                    <div class="flex flex-wrap justify-between items-start gap-4 mb-8">
                        <div>
                            <h1 class="text-3xl font-black text-slate-800">발주서 관리</h1>
                            <p class="text-slate-500 mt-2">국내 업체용 발주서와 해외 업체용 Purchase Order를 분리해서 작성하고, 이전 발주서를 검색합니다.</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="renderDomesticPOForm()" class="px-5 py-3 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700">
                                <i class="fa-solid fa-plus mr-2"></i>국내용 새 발주서
                            </button>
                            <button onclick="renderOverseasPOForm()" class="px-5 py-3 bg-cyan-600 text-white rounded-lg font-bold hover:bg-cyan-700">
                                <i class="fa-solid fa-plus mr-2"></i>해외용 새 PO
                            </button>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-2 gap-6 mb-8">
                        <button onclick="renderDomesticPOForm()" class="bg-white rounded-2xl shadow p-7 text-left hover:shadow-lg border border-slate-200 hover:border-blue-400 transition">
                            <div class="w-14 h-14 rounded-xl bg-blue-100 text-blue-600 flex items-center justify-center mb-5">
                                <i class="fa-solid fa-file-invoice text-2xl"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-800">국내용 발주서</h2>
                            <p class="text-slate-500 mt-3 leading-7">국내 거래처에 보내는 한글 발주서입니다. 공급가액, 부가세, 합계금액을 자동 계산합니다.</p>
                            <div class="mt-6 text-blue-600 font-bold">국내용 작성하기 →</div>
                        </button>

                        <button onclick="renderOverseasPOForm()" class="bg-white rounded-2xl shadow p-7 text-left hover:shadow-lg border border-slate-200 hover:border-cyan-400 transition">
                            <div class="w-14 h-14 rounded-xl bg-cyan-100 text-cyan-600 flex items-center justify-center mb-5">
                                <i class="fa-solid fa-plane-departure text-2xl"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-800">해외용 Purchase Order</h2>
                            <p class="text-slate-500 mt-3 leading-7">해외 업체에 보내는 영문 발주서입니다. Currency, Incoterms, Payment Terms를 포함합니다.</p>
                            <div class="mt-6 text-cyan-600 font-bold">해외용 작성하기 →</div>
                        </button>
                    </div>

                    <div class="bg-white rounded-2xl shadow p-6">

                            <div>
                                <h2 class="text-2xl font-black text-slate-800">이전 발주서 검색</h2>
                                <p class="text-sm text-slate-500 mt-1">발주번호, 공급처, 담당자, 품목명으로 검색할 수 있습니다.</p>
                            </div>
                            <button onclick="refreshPOHistoryFromDB(false)" class="px-4 py-2 bg-slate-100 rounded-lg font-bold hover:bg-slate-200 text-sm">
                                <i class="fa-solid fa-rotate mr-1"></i>DB 새로고침
                            </button>
                        </div>

                            <input id="po_history_keyword" oninput="renderPOHistory()" class="input-box md:col-span-2" placeholder="발주번호 / 공급처 / 담당자 / 품목명 검색">

                                <option value="all">전체</option>
                                <option value="domestic">국내용</option>
                                <option value="overseas">해외용</option>

                            <select id="po_history_status" onchange="renderPOHistory()" class="input-box">
                                <option value="all">상태 전체</option>

                                    <tr>
                                        <th class="p-3 text-left">구분</th>
                                        <th class="p-3 text-left">발주번호</th>
                                        <th class="p-3 text-left">발주일</th>
                                        <th class="p-3 text-left">공급처</th>

        function addPORow(type, name = '', spec = '', qty = 1, price = 0) {
            const tbody = document.getElementById(type + '_items');
            if (!tbody) return;

            const row = document.createElement('tr');
            row.className = 'border-t';
            row.innerHTML = `
                <td class="p-2 text-center po-no"></td>
                <td class="p-2"><input class="input-box po-name" value="${escapeAttr(name)}" oninput="calcPO('${type}')"></td>
                <td class="p-2"><input class="input-box po-spec" value="${escapeAttr(spec)}" oninput="calcPO('${type}')"></td>
                <td class="p-2"><input type="number" class="input-box po-qty text-right" value="${qty}" oninput="calcPO('${type}')"></td>
                <td class="p-2"><input type="number" class="input-box po-price text-right" value="${price}" oninput="calcPO('${type}')"></td>
                <td class="p-2 text-right font-bold po-amount">0</td>
                <td class="p-2 text-center">
                    <button onclick="this.closest('tr').remove(); calcPO('${type}')" class="px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100"><i class="fa-solid fa-trash"></i></button>
                </td>
            `;
            tbody.appendChild(row);
            calcPO(type);
        }

        function calcPO(type) {
            const tbody = document.getElementById(type + '_items');
            if (!tbody) return;

            let subtotal = 0;
            [...tbody.querySelectorAll('tr')].forEach((row, idx) => {
                row.querySelector('.po-no').textContent = idx + 1;
                const qty = Number(row.querySelector('.po-qty').value || 0);
                const price = Number(row.querySelector('.po-price').value || 0);
                const amount = qty * price;
                subtotal += amount;
                row.querySelector('.po-amount').textContent = formatNumber(amount);
            });

            if (type === 'domestic') {
                const vat = Math.round(subtotal * 0.1);
                setText('dom_subtotal', formatNumber(subtotal));
                setText('dom_vat', formatNumber(vat));
                setText('dom_total', formatNumber(subtotal + vat));
            } else {
                const cur = getValue('exp_currency') || 'USD';
                setText('exp_subtotal', cur + ' ' + formatNumber(subtotal));
                setText('exp_total', cur + ' ' + formatNumber(subtotal));
            }
        }

        function setText(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        function collectPOItems(type) {
            const tbody = document.getElementById(type + '_items');
            if (!tbody) return [];
            return [...tbody.querySelectorAll('tr')].map((row, idx) => {
                const qty = Number(row.querySelector('.po-qty').value || 0);
                const price = Number(row.querySelector('.po-price').value || 0);
                return {
                    no: idx + 1,
                    name: row.querySelector('.po-name').value,
                    spec: row.querySelector('.po-spec').value,
                    qty,
                    price,
                    amount: qty * price
                };
            });
        }

        function collectPOData(type) {
            const items = collectPOItems(type);
            const subtotal = items.reduce((sum, i) => sum + i.amount, 0);
            const now = new Date().toISOString();

            if (type === 'domestic') {
                const vat = Math.round(subtotal * 0.1);
                return {
                    id: getValue('dom_po_id') || makePOId(), type,
                    po_no: getValue('dom_po_no'), po_date: getValue('dom_po_date'), writer: getValue('dom_writer'), delivery_date: getValue('dom_delivery_date'),
                    buyer_name: getValue('dom_buyer_name'), buyer_biz: getValue('dom_buyer_biz'), buyer_addr: getValue('dom_buyer_addr'), buyer_tel: getValue('dom_buyer_tel'), buyer_email: getValue('dom_buyer_email'),
                    supplier_name: getValue('dom_supplier_name'), supplier_biz: getValue('dom_supplier_biz'), supplier_manager: getValue('dom_supplier_manager'), supplier_tel: getValue('dom_supplier_tel'), supplier_email: getValue('dom_supplier_email'), supplier_addr: getValue('dom_supplier_addr'), delivery_place: getValue('dom_delivery_place'),
                    note: getValue('dom_note'), currency: 'KRW', subtotal, vat, total: subtotal + vat, items,
                    updated_at: now
                };
            }

            return {
                id: getValue('exp_po_id') || makePOId(), type,
                po_no: getValue('exp_po_no'), po_date: getValue('exp_po_date'), delivery_date: getValue('exp_delivery_date'), currency: getValue('exp_currency'), incoterms: getValue('exp_incoterms'),
                buyer_name: getValue('exp_buyer_name'), buyer_addr: getValue('exp_buyer_addr'), buyer_tel: getValue('exp_buyer_tel'), buyer_email: getValue('exp_buyer_email'),
                supplier_name: getValue('exp_supplier_name'), supplier_biz: getValue('exp_supplier_biz'), supplier_manager: getValue('exp_supplier_manager'), supplier_tel: getValue('exp_supplier_tel'), supplier_email: getValue('exp_supplier_email'), supplier_addr: getValue('exp_supplier_addr'), destination: getValue('exp_destination'),
                payment_terms: getValue('exp_payment_terms'), note: getValue('exp_note'), subtotal, vat: 0, total: subtotal, items,
                updated_at: now
            };
        }

        function saveCurrentPO(type, status = '저장', silent = false) {
            const data = collectPOData(type);
            data.status = status;
            if (!data.created_at) data.created_at = new Date().toISOString();

            const list = loadPOHistory();
            const idx = list.findIndex(x => x.id === data.id || x.po_no === data.po_no);
            if (idx >= 0) {
                data.created_at = list[idx].created_at || data.created_at;
                list[idx] = Object.assign({}, list[idx], data);
            } else {
                list.unshift(data);
            }
            localStorage.setItem(PO_STORAGE_KEY, JSON.stringify(list));

            if (type === 'domestic') setValue('dom_po_id', data.id);
            if (type === 'overseas') setValue('exp_po_id', data.id);

            if (!silent) alert('발주서를 저장했습니다. 발주 관리 검색 목록에서 다시 찾을 수 있습니다.');
            return data;
        }

        function makePOId() {
            return 'po_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        }

        function loadPOHistory() {
            try {
                const arr = JSON.parse(localStorage.getItem(PO_STORAGE_KEY) || '[]');
                return Array.isArray(arr) ? arr : [];
            } catch (e) {
                return [];
            }
        }

        function renderPOHistory() {
            const tbody = document.getElementById('po_history_body');
            if (!tbody) return;

            const keyword = (getValue('po_history_keyword') || '').toLowerCase().trim();
            const typeFilter = getValue('po_history_type') || 'all';
            const statusFilter = getValue('po_history_status') || 'all';
            let list = loadPOHistory();

            list = list.filter(po => {
                const typeOk = typeFilter === 'all' || po.type === typeFilter;
                const statusOk = statusFilter === 'all' || po.status === statusFilter;
                const searchText = [
                    po.po_no, po.po_date, po.supplier_name, po.supplier_manager, po.supplier_email, po.status,
                    ...(po.items || []).map(i => `${i.name} ${i.spec}`)
                ].join(' ').toLowerCase();
                const keywordOk = !keyword || searchText.includes(keyword);
                return typeOk && statusOk && keywordOk;
            });

            list.sort((a, b) => String(b.updated_at || b.created_at || '').localeCompare(String(a.updated_at || a.created_at || '')));

            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-8 text-center text-slate-500">검색된 발주서가 없습니다. 발주서를 작성한 뒤 저장하면 이곳에 표시됩니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(po => `
                <tr class="border-t hover:bg-slate-50">
                    <td class="p-3"><span class="px-2 py-1 rounded-full text-xs font-bold ${po.type === 'domestic' ? 'bg-blue-100 text-blue-700' : 'bg-cyan-100 text-cyan-700'}">${po.type === 'domestic' ? '국내' : '해외'}</span></td>
                    <td class="p-3 font-bold">${escapeHtml(po.po_no || '')}</td>
                    <td class="p-3">${escapeHtml(po.po_date || '')}</td>
                    <td class="p-3">${escapeHtml(po.supplier_name || '')}</td>
                    <td class="p-3">${escapeHtml(po.supplier_manager || '')}</td>
                    <td class="p-3 text-right font-bold">${po.currency && po.currency !== 'KRW' ? escapeHtml(po.currency) + ' ' : ''}${formatNumber(po.total || po.subtotal || 0)}</td>
                    <td class="p-3">${escapeHtml(po.status || '저장')}</td>
                    <td class="p-3 text-center whitespace-nowrap">
                        <button onclick="openSavedPO('${po.id}')" class="px-3 py-1 bg-slate-800 text-white rounded text-xs font-bold hover:bg-slate-700">열기</button>
                        <button onclick="deleteSavedPO('${po.id}')" class="px-3 py-1 bg-red-50 text-red-600 rounded text-xs font-bold hover:bg-red-100 ml-1">삭제</button>
                    </td>
                </tr>
            `).join('');
        }

        function openSavedPO(id) {
            const po = loadPOHistory().find(x => x.id === id);
            if (!po) {
                alert('발주서를 찾지 못했습니다.');
                return;
            }
            if (po.type === 'overseas') renderOverseasPOForm(po);
            else renderDomesticPOForm(po);
        }

        function deleteSavedPO(id) {
            if (!confirm('이 발주서 기록을 삭제할까요?')) return;
            const list = loadPOHistory().filter(x => x.id !== id);
            localStorage.setItem(PO_STORAGE_KEY, JSON.stringify(list));
            renderPOHistory();
        }

        async function refreshPOHistoryFromDB(silent = true) {
            const client = getSupabaseClient();
            if (!client || !client.from) {
                if (!silent) alert('Supabase 연결 객체를 찾지 못했습니다. 현재는 브라우저 저장 목록만 검색합니다.');
                return;
            }

            try {
                const { data, error } = await client.from('purchase_orders').select('*').limit(200);
                if (error || !Array.isArray(data)) throw error || new Error('purchase_orders 데이터 없음');

                const local = loadPOHistory();
                const merged = [...local];
                data.forEach(row => {
                    const po = normalizePurchaseOrderRow(row);
                    const idx = merged.findIndex(x => x.id === po.id || x.po_no === po.po_no);
                    if (idx >= 0) merged[idx] = Object.assign({}, merged[idx], po);
                    else merged.push(po);
                });
                localStorage.setItem(PO_STORAGE_KEY, JSON.stringify(merged));
                renderPOHistory();
                if (!silent) alert('DB 발주서 목록을 불러왔습니다. 단, DB 필드명이 다르면 일부 항목이 비어 있을 수 있습니다.');
            } catch (e) {
                console.warn('purchase_orders DB refresh failed:', e);
                if (!silent) alert('DB에서 발주서 목록을 불러오지 못했습니다. 기존 발주 관리 테이블명/필드명을 확인해야 합니다.');
            }
        }

        function normalizePurchaseOrderRow(row) {
            const type = row.type || row.po_type || row.order_type || (String(row.po_no || row.no || '').includes('EXP') ? 'overseas' : 'domestic');
            const items = Array.isArray(row.items) ? row.items : [];
            return {
                id: String(row.id || row.uuid || row.po_no || makePOId()),
                type,
                po_no: row.po_no || row.no || row.document_no || '',
                po_date: row.po_date || row.date || row.created_at?.slice?.(0,10) || '',
                supplier_name: row.supplier_name || row.partner_name || row.vendor_name || row.customer_name || '',
                supplier_biz: row.supplier_biz || row.biz_num || row.business_number || row.business_no || row.reg_no || '',
                supplier_manager: row.supplier_manager || row.manager_name || row.contact_name || '',
                supplier_email: row.supplier_email || row.email || row.contact_email || '',
                supplier_tel: row.supplier_tel || row.phone || row.tel || '',
                supplier_addr: row.supplier_addr || row.address || row.addr || row.company_address || '',
                currency: row.currency || (type === 'overseas' ? 'USD' : 'KRW'),
                total: Number(row.total || row.total_amount || row.amount || 0),
                status: row.status || 'DB불러옴',
                items,
                created_at: row.created_at || new Date().toISOString(),
                updated_at: row.updated_at || row.created_at || new Date().toISOString()
            };
        }

        function getSupabaseClient() {
            const candidates = [];
            try { if (typeof supabaseClient !== 'undefined') candidates.push(supabaseClient); } catch (e) {}
            try { if (typeof supabase !== 'undefined' && supabase.from) candidates.push(supabase); } catch (e) {}
            try { if (typeof db !== 'undefined') candidates.push(db); } catch (e) {}
            try { if (typeof client !== 'undefined') candidates.push(client); } catch (e) {}
            try { if (window.supabaseClient) candidates.push(window.supabaseClient); } catch (e) {}
            try { if (window.db) candidates.push(window.db); } catch (e) {}
            try { if (window.client) candidates.push(window.client); } catch (e) {}
            try { if (window.supabase && window.supabase.from) candidates.push(window.supabase); } catch (e) {}
            return candidates.find(c => c && typeof c.from === 'function') || null;
        }

        async function loadPartnerCache(force = false) {
            if (partnerCacheLoaded && !force) return partnerCache;
            const collected = [];

            ['kooky_partners', 'erp_partners', 'partners'].forEach(key => {
                try {
                    const data = JSON.parse(localStorage.getItem(key) || '[]');
                    if (Array.isArray(data)) collected.push(...data);
                } catch (e) {}
            });

            ['partners', 'partnerData', 'partnersData', 'allPartners'].forEach(key => {
                try {
                    if (Array.isArray(window[key])) collected.push(...window[key]);
                } catch (e) {}
            });

            const client = getSupabaseClient();
            if (client && client.from) {
                try {
                    const { data, error } = await client.from('partners').select('*').limit(1000);
                    if (!error && Array.isArray(data)) collected.push(...data);
                } catch (e) {
                    console.warn('partners DB load failed:', e);
                }
            }

            const map = new Map();
            collected.map(normalizePartner).filter(p => p.name).forEach(p => {
                const key = `${p.name}|${p.email}|${p.phone}`;
                if (!map.has(key)) map.set(key, p);
            });
            partnerCache = [...map.values()];
            partnerCacheLoaded = true;
            return partnerCache;
        }

        function normalizePartner(p) {
            return {
                id: p.id || p.uuid || '',
                name: p.name || p.company_name || p.partner_name || p.customer_name || p.supplier_name || p.vendor_name || '',
                biz: p.biz_num || p.biz_no || p.business_number || p.business_no || p.reg_no || p.registration_no || p.tax_id || p.vat_no || '',
                manager: p.manager_name || p.contact_name || p.manager || p.contact || p.owner_name || '',
                email: p.email || p.manager_email || p.contact_email || p.mail || '',
                phone: p.phone || p.tel || p.telephone || p.mobile || p.manager_phone || p.contact_phone || '',
                address: p.address || p.addr || p.company_address || p.supplier_addr || p.vendor_address || '',
                raw: p
            };
        }

        async function showPartnerSuggestions(type) {
            const prefix = type === 'domestic' ? 'dom' : 'exp';
            const input = document.getElementById(prefix + '_supplier_name');
            const box = document.getElementById(prefix + '_partner_suggestions');
            if (!input || !box) return;

                const text = `${p.name} ${p.manager} ${p.email} ${p.phone} ${p.biz}`.toLowerCase();
                return !q || text.includes(q);
            }).slice(0, 12);
            selectedPartnerResults[type] = results;

            if (!results.length) {
                box.innerHTML = `<div class="p-4 text-sm text-slate-500">검색 결과가 없습니다. 거래처 관리에 회사 정보가 등록되어 있는지 확인하세요.</div>`;
                box.classList.remove('hidden');
                return;
            }

            box.innerHTML = results.map((p, idx) => `
                <button type="button" onclick="selectPartner('${type}', ${idx})" class="block w-full text-left p-3 hover:bg-blue-50 border-b last:border-b-0">

        }

    <script>
        // 시간 자동 동기화 설정
        function setupAutoTimeSync() {
            const sDate = document.getElementById('eventStartDate');
            const eDate = document.getElementById('eventEndDate');
            const sTime = document.getElementById('eventStartTime');
            const eTime = document.getElementById('eventEndTime');

            if (sDate && eDate) {
                sDate.addEventListener('change', function() {
                    eDate.value = this.value;
                });
            }

            if (sTime && eTime) {
                sTime.addEventListener('change', function() {
                    if (!this.value) return;
                    const [hours, mins] = this.value.split(':').map(Number);
                    const dateObj = new Date();
                    dateObj.setHours(hours + 1);
                    dateObj.setMinutes(mins);
                    const newHour = String(dateObj.getHours()).padStart(2, '0');
                    const newMin = String(dateObj.getMinutes()).padStart(2, '0');
                    eTime.value = `${newHour}:${newMin}`;
                });
            }
        }

        // 앱 시작
        window.onload = async () => {
            try {
                const initialized = await initializeApp();
                if (initialized) {
                    setupAutoTimeSync();
                    switchTab('dashboard');
                }
            } catch (e) {
                console.error("초기화 오류:", e);
            }
        };
    </script>
