    <!-- 안정화 버전: 국내/해외 발주서 관리 -->
    <script>
    (function(){
        const PO2_KEY = 'kooky_po_history_clean_v1';
        let PO2_PARTNERS = [];
        let PO2_PARTNERS_LOADED = false;
        let PO2_SELECTED = { domestic: [], overseas: [] };

        function el(id){ return document.getElementById(id); }
        function val(id){ const x = el(id); return x ? (x.value || x.textContent || '') : ''; }
        function setVal(id, v){ const x = el(id); if (x) x.value = v || ''; }
        function setText(id, v){ const x = el(id); if (x) x.textContent = v || ''; }
        function esc(v){ return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
        function attr(v){ return esc(v).replace(/`/g,'&#096;'); }
        function num(v){ return Number(v || 0).toLocaleString('ko-KR'); }
        function today(){ return new Date().toISOString().slice(0,10); }
        function ymd(){ return today().replaceAll('-',''); }
        function makeId(){ return 'po_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }
        function domesticNo(){ return 'PO-' + ymd() + '-001'; }
        function overseasNo(){ return 'PO-EXP-' + ymd() + '-001'; }

        function activeNav(btn){
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-slate-800','text-white','font-bold'));
            if (btn) btn.classList.add('bg-slate-800','text-white','font-bold');
        }

        function loadHistory(){
            try { const a = JSON.parse(localStorage.getItem(PO2_KEY) || '[]'); return Array.isArray(a) ? a : []; }
            catch(e){ return []; }
        }
        function saveHistory(list){ localStorage.setItem(PO2_KEY, JSON.stringify(list)); }

        function po2_getDbClient(){
            try { return getClient && getClient(); } catch(e) {}
            try { if(window.supabaseClient) return window.supabaseClient; } catch(e) {}
            try { if(window.db) return window.db; } catch(e) {}
            try { if(window.client) return window.client; } catch(e) {}
            return null;
        }

        function po2_toDbRow(data){
            return {
                id: data.id,
                po_no: data.po_no || '',
                po_type: data.type || 'domestic',
                po_date: data.po_date || null,
                supplier_name: data.supplier_name || '',
                supplier_email: data.supplier_email || '',
                project_name: data.project_name || data.project || '',
                total: Number(data.total || 0),
                status: data.status || '',
                public_url: data.public_url || '',
                po_data: data
            };
        }

        function po2_fromDbRow(row){
            return row && row.po_data ? Object.assign({}, row.po_data, {
                id: row.id,
                po_no: row.po_no || row.po_data.po_no,
                type: row.po_type || row.po_data.type,
                status: row.status || row.po_data.status,
                project_name: row.project_name || row.po_data.project_name || row.po_data.project || '',
                public_url: row.public_url || row.po_data.public_url,
                updated_at: row.updated_at || row.po_data.updated_at
            }) : row;
        }

        async function po2_loadCloudHistory(){
            const client = po2_getDbClient();
            if(!client || !client.from) return loadHistory();
            try{
                const { data, error } = await client
                    .from('erp_purchase_orders')
                    .select('*')
                    .order('updated_at', { ascending:false })
                    .limit(500);
                if(error) throw error;
                const list = (data || []).map(po2_fromDbRow).filter(Boolean);
                if(list.length) saveHistory(list);
                return list;
            }catch(e){
                console.warn('발주서 Supabase 조회 실패, 로컬 이력 사용:', e);
                return loadHistory();
            }
        }

        async function po2_getCloudHistoryById(id){
            const client = po2_getDbClient();
            if(client && client.from){
                try{
                    const { data, error } = await client
                        .from('erp_purchase_orders')
                        .select('*')
                        .eq('id', id)
                        .maybeSingle();
                    if(error) throw error;
                    if(data) return po2_fromDbRow(data);
                }catch(e){
                    console.warn('발주서 단건 조회 실패, 로컬 이력 사용:', e);
                }
            }
            return loadHistory().find(x => x.id === id);
        }

        async function po2_deleteCloudHistory(id){
            const client = po2_getDbClient();
            if(client && client.from){
                try{
                    const { error } = await client.from('erp_purchase_orders').delete().eq('id', id);
                    if(error) throw error;
                }catch(e){
                    console.warn('발주서 Supabase 삭제 실패:', e);
                    alert('Supabase 삭제 중 오류가 발생했습니다. 로컬 이력만 삭제될 수 있습니다.\n' + (e.message || e));
                }
            }
        }

        function upsertHistory(data){
            const list = loadHistory();
            const idx = list.findIndex(x => x.id === data.id || (data.po_no && x.po_no === data.po_no));
            if (idx >= 0) list[idx] = Object.assign({}, list[idx], data);
            else list.unshift(data);
            saveHistory(list.slice(0,500));

            const client = po2_getDbClient();
            if(client && client.from){
                client.from('erp_purchase_orders')
                    .upsert(po2_toDbRow(data), { onConflict:'id' })
                    .then(({ error }) => {
                        if(error) console.error('발주서 Supabase 저장 실패:', error);
                    });
            }
        }

        window.po2_openMenu = function(btn){
            activeNav(btn);
            const search = el('searchContainer');
            const content = el('contentArea');
            if (search) search.innerHTML = '';
            if (!content) { alert('contentArea 영역을 찾지 못했습니다. erp.html 구조를 확인해야 합니다.'); return; }
            content.innerHTML = `

            list = list.filter(po => {

        const PO2_MAIL_LOG_KEY = 'kooky_po_mail_logs_v1';

        function po2_loadMailLogs(){
            try {
                const arr = JSON.parse(localStorage.getItem(PO2_MAIL_LOG_KEY) || '[]');
                return Array.isArray(arr) ? arr : [];
            } catch(e) { return []; }
        }

        async function po2_loadMailLogsCloud(){
            const client = po2_getDbClient();
            if(!client || !client.from) return po2_loadMailLogs();
            try{
                const { data, error } = await client
                    .from('erp_po_mail_logs')
                    .select('*')
                    .order('sent_at', { ascending:false })
                    .limit(300);
                if(error) throw error;
                const logs = (data || []).map(row => ({
                    id: row.id,
                    sent_at: row.sent_at,
                    type: row.po_type,
                    po_no: row.po_no,
                    to: row.to_email,
                    subject: row.subject,
                    attachmentName: row.public_url ? '웹 발주서 링크' : '',
                    url: row.public_url,
                    ok: row.ok,
                    error: row.error,
                    messageId: row.message_id
                }));
                if(logs.length) localStorage.setItem(PO2_MAIL_LOG_KEY, JSON.stringify(logs.slice(0,300)));
                return logs;
            }catch(e){
                console.warn('메일 이력 Supabase 조회 실패, 로컬 이력 사용:', e);
                return po2_loadMailLogs();
            }
        }

        function po2_saveMailLog(log){
            const fullLog = { id: log.id || ('mail_' + Date.now()), sent_at: new Date().toISOString(), ...log };
            const arr = po2_loadMailLogs();
            arr.unshift(fullLog);
            localStorage.setItem(PO2_MAIL_LOG_KEY, JSON.stringify(arr.slice(0, 300)));

            const client = po2_getDbClient();
            if(client && client.from){
                client.from('erp_po_mail_logs').upsert({
                    id: fullLog.id,
                    po_id: fullLog.po_id || '',
                    po_no: fullLog.po_no || '',
                    po_type: fullLog.type || '',
                    to_email: fullLog.to || '',
                    subject: fullLog.subject || '',
                    public_url: fullLog.url || '',
                    ok: fullLog.ok !== false,
                    error: fullLog.error || '',
                    message_id: fullLog.messageId || '',
                    sent_at: fullLog.sent_at
                }, { onConflict:'id' }).then(({ error }) => {
                    if(error) console.error('메일 이력 Supabase 저장 실패:', error);
                });
            }
        }

        function po2_dateKo(v){
            if (!v) return '';
            const m = String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);
            return m ? `${m[1]}년 ${m[2]}월 ${m[3]}일` : String(v);
        }
        function po2_dateEn(v){
            if (!v) return '';
            const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})/);
            if(!m) return String(v);
            return `${m[3]}-${months[Number(m[2])-1]}-${m[1]}`;
        }
        function po2_moneyKo(n){
            n = Math.floor(Number(n || 0));
            if (!n) return '영';
            const nums=['','일','이','삼','사','오','육','칠','팔','구'];
            const pos=['','십','백','천'];
            const units=['','만','억','조'];
            function part(x){
                let out='';
                const str=String(x).padStart(4,'0');
                for(let i=0;i<4;i++){
                    const d=Number(str[i]);
                    if(!d) continue;
                    const p=3-i;
                    out += (d===1 && p>0 ? '' : nums[d]) + pos[p];
                }
                return out;
            }
            const groups=[];
            while(n>0){ groups.push(n%10000); n=Math.floor(n/10000); }
            let out='';
            for(let i=groups.length-1;i>=0;i--){
                if(groups[i]) out += part(groups[i]) + units[i];
            }
            return out;
        }

        function getClient(){
            const arr=[];
            try{ if(window.supabaseClient) arr.push(window.supabaseClient); }catch(e){}
            try{ if(window.db) arr.push(window.db); }catch(e){}
            try{ if(window.client) arr.push(window.client); }catch(e){}
            try{ if(typeof supabaseClient !== 'undefined') arr.push(supabaseClient); }catch(e){}
            try{ if(typeof db !== 'undefined') arr.push(db); }catch(e){}
            try{ if(typeof client !== 'undefined') arr.push(client); }catch(e){}
            return arr.find(c => c && typeof c.from === 'function') || null;
        }
        window.po2_loadPartners = async function(force=false){
            if (PO2_PARTNERS_LOADED && !force) return PO2_PARTNERS;
            const all=[];
            ['kooky_partners','erp_partners','partners'].forEach(k=>{ try{ const a=JSON.parse(localStorage.getItem(k)||'[]'); if(Array.isArray(a)) all.push(...a); }catch(e){} });
            ['partners','partnerData','partnersData','allPartners'].forEach(k=>{ try{ if(Array.isArray(window[k])) all.push(...window[k]); }catch(e){} });
            const c=getClient(); if(c){ try{ const r=await c.from('partners').select('*').limit(1000); if(!r.error && Array.isArray(r.data)) all.push(...r.data); }catch(e){ console.warn('partner load failed',e); } }
            const map=new Map(); all.map(normPartner).filter(p=>p.name).forEach(p=>{ const key=p.name+'|'+p.email+'|'+p.phone; if(!map.has(key)) map.set(key,p); });
            PO2_PARTNERS=[...map.values()]; PO2_PARTNERS_LOADED=true; return PO2_PARTNERS;
        };
        function normPartner(p){ return {name:p.name||p.company_name||p.partner_name||p.customer_name||p.supplier_name||p.vendor_name||'', biz:p.biz_num||p.biz_no||p.business_number||p.business_no||p.reg_no||p.registration_no||p.tax_id||p.vat_no||'', manager:p.manager_name||p.contact_name||p.manager||p.contact||p.owner_name||'', email:p.email||p.manager_email||p.contact_email||p.mail||'', phone:p.phone||p.tel||p.telephone||p.mobile||p.manager_phone||p.contact_phone||'', address:p.address||p.addr||p.company_address||p.supplier_addr||p.vendor_address||''}; }
        window.po2_showPartnerSuggestions = async function(type){
            const pre = type === 'domestic' ? 'dom' : 'exp'; const input=el(pre+'_supplier_name'); const box=el(pre+'_partner_suggestions'); if(!input || !box) return;
            const q=input.value.trim().toLowerCase(); const partners=await po2_loadPartners(); const res=partners.filter(p => (`${p.name} ${p.manager} ${p.email} ${p.phone} ${p.biz}`).toLowerCase().includes(q)).slice(0,12); PO2_SELECTED[type]=res;
            if(!res.length){ box.innerHTML='<div class="p-4 text-sm text-slate-500">검색 결과가 없습니다.</div>'; box.classList.remove('hidden'); return; }
            box.innerHTML=res.map((p,i)=>`<button type="button" onclick="po2_selectPartner('${type}',${i})" class="block w-full text-left p-3 hover:bg-blue-50 border-b last:border-b-0"><div class="font-bold text-slate-800">${esc(p.name)}</div><div class="text-xs text-slate-500 mt-1">사업자번호: ${esc(p.biz||'-')} · 담당자: ${esc(p.manager||'-')} · 메일: ${esc(p.email||'-')} · 연락처: ${esc(p.phone||'-')}</div><div class="text-xs text-slate-400 mt-1">${esc(p.address||'')}</div></button>`).join(''); box.classList.remove('hidden');
        };
        window.po2_selectPartner = function(type, idx){
            const p=(PO2_SELECTED[type]||[])[idx]; if(!p) return; const pre=type==='domestic'?'dom':'exp';
            setVal(pre+'_supplier_name',p.name); setVal(pre+'_supplier_biz',p.biz); setVal(pre+'_supplier_manager',p.manager); setVal(pre+'_supplier_tel',p.phone); setVal(pre+'_supplier_email',p.email); setVal(pre+'_supplier_addr',p.address);
            const b=el(pre+'_partner_suggestions'); if(b) b.classList.add('hidden');
        };
        document.addEventListener('click', function(e){
            if (e.target && e.target.closest && !e.target.closest('#dom_supplier_name') && !e.target.closest('#dom_partner_suggestions')) { const b=el('dom_partner_suggestions'); if(b) b.classList.add('hidden'); }
            if (e.target && e.target.closest && !e.target.closest('#exp_supplier_name') && !e.target.closest('#exp_partner_suggestions')) { const b=el('exp_partner_suggestions'); if(b) b.classList.add('hidden'); }
        });
    })();
    </script>

  }
  function q2_moneyKo(n){
    n = Math.floor(Number(n || 0));
    if(!n) return "영";
    const nums=["","일","이","삼","사","오","육","칠","팔","구"];
    const pos=["","십","백","천"];
    const units=["","만","억","조"];
    function part(x){
      let out="";
      const s=String(x).padStart(4,"0");
      for(let i=0;i<4;i++){
        const d=Number(s[i]);
        if(!d) continue;
        const p=3-i;
        out += (d===1 && p>0 ? "" : nums[d]) + pos[p];
      }
      return out;
    }
    const groups=[];
    while(n>0){ groups.push(n%10000); n=Math.floor(n/10000); }
    let out="";
    for(let i=groups.length-1;i>=0;i--) if(groups[i]) out += part(groups[i]) + units[i];
    return out;
  }
  function q2_load(){
    try{
      const arr = JSON.parse(localStorage.getItem(QKEY) || "[]");
      return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
  }
  function q2_saveAll(arr){ localStorage.setItem(QKEY, JSON.stringify(arr)); }

  function q2_getDbClient(){
    try { if(window.supabaseClient) return window.supabaseClient; } catch(e) {}
    try { if(window.db) return window.db; } catch(e) {}
    try { if(window.client) return window.client; } catch(e) {}
    try { if(typeof supabaseClient !== "undefined") return supabaseClient; } catch(e) {}
    try { if(typeof db !== "undefined") return db; } catch(e) {}
    try { if(typeof client !== "undefined") return client; } catch(e) {}
    return null;
  }

  function q2_toDbRow(d){
    return {
      id: d.id,
      quote_no: d.quote_no || '',
      quote_date: d.quote_date || null,
      customer: d.customer || '',
      recipient: d.recipient || '',
      total: Number(d.total || 0),
      memo: d.memo || '',
      quote_data: d
    };
  }

  function q2_fromDbRow(row){
    return row && row.quote_data ? Object.assign({}, row.quote_data, {
      id: row.id,
      quote_no: row.quote_no || row.quote_data.quote_no,
      quote_date: row.quote_date || row.quote_data.quote_date,
      customer: row.customer || row.quote_data.customer,
      recipient: row.recipient || row.quote_data.recipient,
      total: Number(row.total || row.quote_data.total || 0),
      memo: row.memo || row.quote_data.memo,
      updated_at: row.updated_at || row.quote_data.updated_at
    }) : row;
  }

  async function q2_loadCloud(){
    const client = q2_getDbClient();
    if(!client || !client.from) return q2_load();
    try{
      const { data, error } = await client
        .from('erp_quotes')
        .select('*')
        .order('updated_at', { ascending:false })
        .limit(500);
      if(error) throw error;
      const list = (data || []).map(q2_fromDbRow).filter(Boolean);
      if(list.length) q2_saveAll(list);
      return list;
    }catch(e){
      console.warn('견적서 Supabase 조회 실패, 로컬 이력 사용:', e);
      return q2_load();
    }
  }

  async function q2_getCloudById(id){
    const client = q2_getDbClient();
    if(client && client.from){
      try{
        const { data, error } = await client.from('erp_quotes').select('*').eq('id', id).maybeSingle();
        if(error) throw error;
        if(data) return q2_fromDbRow(data);
      }catch(e){
        console.warn('견적서 단건 조회 실패, 로컬 이력 사용:', e);
      }
    }
    return q2_load().find(x=>x.id===id);
  }

  async function q2_deleteCloud(id){
    const client = q2_getDbClient();
    if(client && client.from){
      try{
        const { error } = await client.from('erp_quotes').delete().eq('id', id);
        if(error) throw error;
      }catch(e){
        console.warn('견적서 Supabase 삭제 실패:', e);
        alert('Supabase 삭제 중 오류가 발생했습니다. 로컬 이력만 삭제될 수 있습니다.\n' + (e.message || e));
      }
    }
  }

  function q2_upsert(d){
    const arr=q2_load();
    const idx=arr.findIndex(x=>x.id===d.id);
    if(idx>=0) arr[idx]=d; else arr.unshift(d);
    q2_saveAll(arr);

    const client = q2_getDbClient();
    if(client && client.from){
      client.from('erp_quotes')
        .upsert(q2_toDbRow(d), { onConflict:'id' })
        .then(({ error }) => {
          if(error) console.error('견적서 Supabase 저장 실패:', error);
        });
    }
  }
  function q2_nextNo(){
    const day=q2_dateCompact(q2_today());
    const arr=q2_load();
    let max=0;
    arr.forEach(x=>{
      const m=String(x.quote_no||"").match(new RegExp("^QT-" + day + "-(\\d+)$"));
      if(m) max=Math.max(max, Number(m[1]||0));
    });
    return "QT-" + day + "-" + String(max+1).padStart(3,"0");
  }

    let total=0;
    document.querySelectorAll("#q2_items tr").forEach((tr,i)=>{
      const qty=q2_n(tr.querySelector(".q2-qty")?.value);
      const price=q2_n(tr.querySelector(".q2-price")?.value);
      const amount=qty*price;
      const a=tr.querySelector(".q2-amount");
      if(a) a.value=q2_num(amount);
      const no=tr.querySelector(".q2-no");
      if(no) no.textContent=i+1;
      total += amount;
    });
    return total;

      if(name || desc || qty || price || note){
        arr.push({no:i+1,name,desc,qty,price,amount,note});
      }
    });
    return arr;
  }

        // 시간 자동 동기화 설정
        function setupAutoTimeSync() {
            const sDate = document.getElementById('eventStartDate');
            const eDate = document.getElementById('eventEndDate');
            const sTime = document.getElementById('eventStartTime');
            const eTime = document.getElementById('eventEndTime');

            if (sDate && eDate) {
                sDate.addEventListener('change', function() {
                    eDate.value = this.value;
                });
            }

            if (sTime && eTime) {
                sTime.addEventListener('change', function() {
                    if (!this.value) return;
                    const [hours, mins] = this.value.split(':').map(Number);
                    const dateObj = new Date();
                    dateObj.setHours(hours + 1);
                    dateObj.setMinutes(mins);
                    const newHour = String(dateObj.getHours()).padStart(2, '0');
                    const newMin = String(dateObj.getMinutes()).padStart(2, '0');
                    eTime.value = `${newHour}:${newMin}`;
                });
            }
        }

        // 앱 시작
        window.onload = async () => {
            try {
                const initialized = await initializeApp();
                if (initialized) {
                    setupAutoTimeSync();
                    switchTab('dashboard');
                }
            } catch (e) {
                console.error("초기화 오류:", e);
            }
        };

<script id="project-po-summary-module-v1">
(function(){
  const PROJECT_VERSION = "PROJECT-CLOUD-v1";

  function p_el(id){ return document.getElementById(id); }
  function p_num(v){ return Number(v || 0).toLocaleString("ko-KR"); }
  function p_esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;"); }

  function p_client(){
    try { if(window.supabaseClient) return window.supabaseClient; } catch(e) {}
    try { if(window.db) return window.db; } catch(e) {}
    try { if(window.client) return window.client; } catch(e) {}
    try { if(typeof supabaseClient !== "undefined") return supabaseClient; } catch(e) {}
    try { if(typeof db !== "undefined") return db; } catch(e) {}
    try { if(typeof client !== "undefined") return client; } catch(e) {}
    return null;
  }

  async function p_loadOrders(){
    const client = p_client();
    if(!client || !client.from) {
      alert("Supabase 연결을 찾지 못했습니다.");
      return [];
    }

    const { data, error } = await client
      .from("erp_purchase_orders")
      .select("*")
      .order("po_date", { ascending:false })
      .limit(1000);

    if(error) {
      console.error(error);
      alert("프로젝트 발주 이력을 불러오지 못했습니다.\\n" + (error.message || error));
      return [];
    }

    return (data || []).map(row => {
      const po = row.po_data || {};
      return Object.assign({}, po, {
        id: row.id,
        po_no: row.po_no || po.po_no,
        type: row.po_type || po.type,
        po_date: row.po_date || po.po_date,
        supplier_name: row.supplier_name || po.supplier_name,
        supplier_email: row.supplier_email || po.supplier_email,
        project_name: row.project_name || po.project_name || po.project || "",
        status: row.status || po.status,
        total: Number(row.total || po.total || 0),
        public_url: row.public_url || po.public_url,
        updated_at: row.updated_at || po.updated_at
      });
    });
  }

  function p_buildSummary(orders){
    const map = new Map();
    orders.forEach(po => {
      const project = (po.project_name || po.project || "").trim();
      if(!project) return;
      if(!map.has(project)) {
        map.set(project, {
          project_name: project,
          po_count: 0,
          item_count: 0,
          total_amount: 0,
          first_po_date: "",
          last_po_date: "",
          orders: []
        });
      }
      const s = map.get(project);
      s.po_count += 1;
      s.orders.push(po);
      s.total_amount += Number(po.total || 0);
      const itemCount = (po.items || []).filter(i => i && (i.name || i.spec)).length;
      s.item_count += itemCount;
      if(!s.first_po_date || String(po.po_date || "") < s.first_po_date) s.first_po_date = po.po_date || "";
      if(!s.last_po_date || String(po.po_date || "") > s.last_po_date) s.last_po_date = po.po_date || "";
    });
    return Array.from(map.values()).sort((a,b) => String(b.last_po_date).localeCompare(String(a.last_po_date)));
  }

  function p_itemsForProject(orders, project){
    const rows = [];
    orders.filter(po => (po.project_name || po.project || "").trim() === project).forEach(po => {
      (po.items || []).forEach(item => {
        if(!item || (!item.name && !item.spec)) return;
        rows.push({
          po_id: po.id,
          po_no: po.po_no,
          po_date: po.po_date,
          type: po.type,
          supplier_name: po.supplier_name,
          item_name: item.name || "",
          item_spec: item.spec || "",
          qty: Number(item.qty || 0),
          price: Number(item.price || 0),
          amount: Number(item.amount || 0),
          currency: po.currency || "KRW",
          status: po.status || ""
        });
      });
    });
    return rows.sort((a,b) => String(b.po_date).localeCompare(String(a.po_date)));
  }

  window.project2_open = async function(){
    const search = p_el("searchContainer");
    const content = p_el("contentArea");
    if(search) search.innerHTML = "";
    if(!content) return;

    content.innerHTML = `
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-wrap justify-between items-center gap-3 mb-6">
          <div>
            <h1 class="text-3xl font-black text-slate-800 border-l-8 border-cyan-500 pl-4">프로젝트 관리</h1>
            <p class="text-slate-500 mt-2">프로젝트명으로 저장된 발주 품목과 비용을 한 번에 확인합니다.</p>
          </div>
          <button type="button" onclick="project2_open()" class="px-5 py-3 bg-slate-100 rounded-lg font-bold hover:bg-slate-200">새로고침</button>
        </div>

        <div class="bg-white rounded-2xl shadow p-6 mb-6">
          <div class="grid md:grid-cols-4 gap-4 items-end">
            <div class="md:col-span-2">
              <label class="block text-sm font-bold text-slate-600 mb-2">프로젝트 검색</label>
              <input id="project2_keyword" class="input-box" placeholder="프로젝트명 입력" oninput="project2_renderSummary()">
            </div>
            <div class="text-sm text-slate-500 md:col-span-2">
              발주서 작성 화면의 <b>프로젝트명</b>에 같은 이름을 입력하면 이 화면에서 자동 집계됩니다.
            </div>
          </div>
        </div>

        <div class="bg-white rounded-2xl shadow overflow-hidden mb-6">
          <div class="p-5 border-b flex justify-between items-center">
            <h2 class="text-xl font-black">프로젝트별 발주 합계</h2>
            <span id="project2_count" class="text-sm text-slate-500"></span>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-100">
                <tr>
                  <th class="p-3 text-left">프로젝트명</th>
                  <th class="p-3 text-right">발주건수</th>
                  <th class="p-3 text-right">품목수</th>
                  <th class="p-3 text-right">총 발주금액</th>
                  <th class="p-3 text-left">최초 발주일</th>
                  <th class="p-3 text-left">최근 발주일</th>
                  <th class="p-3 text-center">상세</th>
                </tr>
              </thead>
              <tbody id="project2_summary_body">
                <tr><td colspan="7" class="p-8 text-center text-slate-500">불러오는 중입니다...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div id="project2_detail" class="bg-white rounded-2xl shadow overflow-hidden hidden"></div>
      </div>`;

    window.__project2_orders = await p_loadOrders();
    project2_renderSummary();
  };

  window.project2_renderSummary = function(){
    const body = p_el("project2_summary_body");
    if(!body) return;

    const keyword = (p_el("project2_keyword")?.value || "").trim().toLowerCase();
    const orders = window.__project2_orders || [];
    let summary = p_buildSummary(orders);
    if(keyword) summary = summary.filter(x => x.project_name.toLowerCase().includes(keyword));

    const count = p_el("project2_count");
    if(count) count.textContent = `총 ${summary.length}개 프로젝트`;

    if(!summary.length) {
      body.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500">프로젝트명이 입력된 발주서가 없습니다.</td></tr>`;
      return;
    }

    body.innerHTML = summary.map(s => `
      <tr class="border-t hover:bg-slate-50">
        <td class="p-3 font-bold">${p_esc(s.project_name)}</td>
        <td class="p-3 text-right">${p_num(s.po_count)}건</td>
        <td class="p-3 text-right">${p_num(s.item_count)}개</td>
        <td class="p-3 text-right font-black text-blue-700">₩ ${p_num(s.total_amount)}</td>
        <td class="p-3">${p_esc(s.first_po_date)}</td>
        <td class="p-3">${p_esc(s.last_po_date)}</td>
        <td class="p-3 text-center">
          <button type="button" onclick="project2_showDetail('${p_esc(s.project_name)}')" class="px-3 py-1 bg-slate-800 text-white rounded font-bold text-xs">보기</button>
        </td>
      </tr>
    `).join("");
  };

  window.project2_showDetail = function(project){
    const box = p_el("project2_detail");
    if(!box) return;

    const rows = p_itemsForProject(window.__project2_orders || [], project);
    const total = rows.reduce((s,x) => s + Number(x.amount || 0), 0);

    box.classList.remove("hidden");
    box.innerHTML = `
      <div class="p-5 border-b flex flex-wrap justify-between items-center gap-3">
        <div>
          <h2 class="text-xl font-black">${p_esc(project)} 발주 상세</h2>
          <p class="text-sm text-slate-500 mt-1">발주 품목 ${p_num(rows.length)}개 / 합계 ₩ ${p_num(total)}</p>
        </div>
        <button type="button" onclick="document.getElementById('project2_detail').classList.add('hidden')" class="px-4 py-2 bg-slate-100 rounded-lg font-bold">닫기</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-slate-100">
            <tr>
              <th class="p-3 text-left">발주번호</th>
              <th class="p-3 text-left">발주일</th>
              <th class="p-3 text-left">공급처</th>
              <th class="p-3 text-left">품목</th>
              <th class="p-3 text-left">규격</th>
              <th class="p-3 text-right">수량</th>
              <th class="p-3 text-right">단가</th>
              <th class="p-3 text-right">금액</th>
              <th class="p-3 text-left">상태</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr class="border-t hover:bg-slate-50">
                <td class="p-3 font-bold">${p_esc(r.po_no)}</td>
                <td class="p-3">${p_esc(r.po_date)}</td>
                <td class="p-3">${p_esc(r.supplier_name)}</td>
                <td class="p-3">${p_esc(r.item_name)}</td>
                <td class="p-3">${p_esc(r.item_spec)}</td>
                <td class="p-3 text-right">${p_num(r.qty)}</td>
                <td class="p-3 text-right">${p_num(r.price)}</td>
                <td class="p-3 text-right font-bold">${r.currency && r.currency !== "KRW" ? p_esc(r.currency) + " " : "₩ "}${p_num(r.amount)}</td>
                <td class="p-3">${p_esc(r.status)}</td>
              </tr>
            `).join("") || `<tr><td colspan="9" class="p-8 text-center text-slate-500">발주 품목이 없습니다.</td></tr>`}
          </tbody>
        </table>
      </div>`;
    box.scrollIntoView({ behavior:"smooth", block:"start" });
  };

  function installProjectSwitch(){
    if(window.__project2SwitchInstalled || typeof window.switchTab !== "function") return;
    const original = window.switchTab;
    window.switchTab = function(tab){
      if(tab === "projects"){
        project2_open();
        return;
      }
      return original.apply(this, arguments);
    };
    window.__project2SwitchInstalled = true;
  }

  installProjectSwitch();
  let tries = 0;
  const timer = setInterval(() => {
    installProjectSwitch();
    tries++;
    if(window.__project2SwitchInstalled || tries > 20) clearInterval(timer);
  }, 300);
})();
</script>
